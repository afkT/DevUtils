                    // = kotlin =

                    // metadata
                    "org.jetbrains.kotlin:kotlin-metadata-jvm:2.4.0-RC",
                    // stdlib
                    "org.jetbrains.kotlin:kotlin-stdlib:2.4.0-RC",
                    // core
                    "androidx.core:core-ktx:1.18.0",
                    // coroutines
                    "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.11.0",
                    // lifecycle_runtime
                    "androidx.lifecycle:lifecycle-runtime-ktx:2.11.0-beta01",
                    // lifecycle_viewmodel
                    "androidx.lifecycle:lifecycle-viewmodel-ktx:2.11.0-beta01",
